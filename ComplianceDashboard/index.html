const generatePDF=(scores,answers,userInfo)=>{const{jsPDF}=window.jspdf;const doc=new jsPDF();const w=doc.internal.pageSize.getWidth();let y=20;doc.setFillColor(59,130,246);doc.rect(0,0,w,40,'F');doc.setTextColor(255,255,255);doc.setFontSize(22);doc.setFont('helvetica','bold');doc.text('Compliance Readiness Report',20,25);doc.setFontSize(11);doc.text(`${CONFIG.companyName} | ${new Date().toLocaleDateString()}`,20,35);y=55;if(userInfo){doc.setTextColor(30,41,59);doc.setFontSize(12);doc.text(`Prepared for: ${userInfo.name}`,20,y);doc.text(`Company: ${userInfo.company}`,20,y+8);doc.text(`Email: ${userInfo.email}`,20,y+16);y+=35;}doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text('Executive Summary',20,y);y+=15;const fws=Object.keys(scores);const bw=(w-50)/4;fws.forEach((fw,i)=>{const x=20+i*(bw+5);const s=scores[fw];const color=s.readiness>=80?[34,197,94]:s.readiness>=50?[234,179,8]:[239,68,68];doc.setFillColor(241,245,249);doc.roundedRect(x,y,bw,30,3,3,'F');doc.setTextColor(30,41,59);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(FRAMEWORKS[fw].name,x+5,y+10);doc.setTextColor(...color);doc.setFontSize(18);doc.text(`${Math.round(s.readiness)}%`,x+5,y+25);});y+=45;fws.forEach(fw=>{if(y>240){doc.addPage();y=20;}const framework=FRAMEWORKS[fw];const score=scores[fw];doc.setFillColor(59,130,246);doc.rect(20,y,w-40,10,'F');doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text(framework.fullName,25,y+7);y+=18;doc.setTextColor(100,116,139);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`Score: ${Math.round(score.readiness)}% | ${score.answered}/${score.total} answered`,25,y);y+=12;framework.categories.forEach(cat=>{const failed=cat.questions.filter(q=>answers[q.id]===false);if(failed.length>0){if(y>260){doc.addPage();y=20;}doc.setTextColor(239,68,68);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(`${cat.name} - ${failed.length} gaps:`,25,y);y+=6;doc.setTextColor(71,85,105);doc.setFont('helvetica','normal');failed.slice(0,3).forEach(q=>{if(y>270){doc.addPage();y=20;}doc.text(`• ${q.text.substring(0,70)}...`,30,y);y+=5;});y+=5;}});y+=10;});doc.setTextColor(148,163,184);doc.setFontSize(9);doc.text(`${CONFIG.companyName} | ${CONFIG.phone} | ${CONFIG.contactUrl}`,20,285);return doc;};

// Printable Report Component
const PrintableReport=({scores,answers,user,companyName})=>{
    const fws=['SOC2','HIPAA','PCI-DSS','CMMC'];
    const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    
    // Get all gaps across frameworks
    const getAllGaps=()=>{
        const gaps=[];
        fws.forEach(fw=>{
            FRAMEWORKS[fw].categories.forEach(cat=>{
                cat.questions.forEach(q=>{
                    if(answers[q.id]===false){
                        gaps.push({framework:FRAMEWORKS[fw].name,category:cat.name,question:q.text,priority:q.priority,owner:q.owner,ref:q.ref});
                    }
                });
            });
        });
        return gaps.sort((a,b)=>(a.priority==='high'?0:1)-(b.priority==='high'?0:1));
    };
    
    const gaps=getAllGaps();
    const totalControls=fws.reduce((sum,fw)=>sum+FRAMEWORKS[fw].categories.reduce((s,c)=>s+c.questions.length,0),0);
    const totalAnswered=Object.values(scores).reduce((sum,s)=>sum+s.answered,0);
    const totalCompliant=Object.values(scores).reduce((sum,s)=>sum+s.yes,0);
    const overallReadiness=totalAnswered>0?Math.round(totalCompliant/totalAnswered*100):0;
    
    return(
        <div className="print-only" id="printable-report">
            {/* Print Header */}
            <div className="print-header">
                <div>
                    <h1 style={{fontSize:'24pt',fontWeight:'700',color:'#1e293b',margin:0}}>Compliance Readiness Report</h1>
                    <p style={{fontSize:'11pt',color:'#64748b',margin:'4px 0 0 0'}}>{CONFIG.companyName}</p>
                </div>
                <div style={{textAlign:'right'}}>
                    <p style={{fontSize:'10pt',color:'#64748b',margin:0}}>Report Generated On</p>
                    <p style={{fontSize:'12pt',fontWeight:'600',color:'#1e293b',margin:'2px 0 0 0'}}>{today}</p>
                </div>
            </div>
            
            {/* Company Info */}
            <div style={{marginBottom:'30px',padding:'16px',background:'#f8fafc',borderRadius:'8px',border:'1px solid #e2e8f0'}}>
                <p style={{margin:0,fontSize:'11pt'}}><strong>Prepared For:</strong> {companyName || user?.company || '[Company Name]'}</p>
                {user&&<p style={{margin:'4px 0 0 0',fontSize:'10pt',color:'#64748b'}}>Contact: {user.name} ({user.email})</p>}
            </div>
            
            {/* Executive Summary Section */}
            <div className="exec-summary avoid-break">
                <h2 style={{fontSize:'16pt',fontWeight:'700',color:'#1e293b',margin:'0 0 20px 0',borderBottom:'2px solid #3b82f6',paddingBottom:'8px'}}>Executive Summary</h2>
                
                {/* Overall Score */}
                <div style={{textAlign:'center',marginBottom:'24px'}}>
                    <div className={`score-card ${overallReadiness>=80?'compliant':overallReadiness>=50?'warning':'critical'}`} style={{display:'inline-block',padding:'20px 40px'}}>
                        <p style={{margin:0,fontSize:'10pt',color:'#64748b',textTransform:'uppercase',letterSpacing:'1px'}}>Overall Readiness</p>
                        <p className="score-value" style={{margin:'8px 0'}}>{overallReadiness}%</p>
                        <p style={{margin:0,fontSize:'10pt',color:'#64748b'}}>{totalCompliant} of {totalAnswered} controls compliant</p>
                    </div>
                </div>
                
                {/* Framework Scores Grid */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'16px',marginBottom:'24px'}}>
                    {fws.map(fw=>{
                        const s=scores[fw];
                        const fr=FRAMEWORKS[fw];
                        const scoreClass=s.readiness>=80?'compliant':s.readiness>=50?'warning':'critical';
                        return(
                            <div key={fw} className={`score-card ${scoreClass}`}>
                                <p style={{margin:0,fontSize:'9pt',fontWeight:'600',color:'#1e293b'}}>{fr.name}</p>
                                <p className="score-value" style={{fontSize:'20pt',margin:'8px 0'}}>{Math.round(s.readiness)}%</p>
                                <p style={{margin:0,fontSize:'8pt',color:'#64748b'}}>{s.yes}/{s.answered} compliant</p>
                            </div>
                        );
                    })}
                </div>
                
                {/* Key Findings */}
                <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'16px'}}>
                    <h3 style={{margin:'0 0 12px 0',fontSize:'12pt',fontWeight:'600',color:'#1e293b'}}>Key Findings</h3>
                    <ul style={{margin:0,paddingLeft:'20px',fontSize:'10pt',lineHeight:'1.6'}}>
                        <li><strong>{totalAnswered}</strong> of {totalControls} controls assessed ({Math.round(totalAnswered/totalControls*100)}% coverage)</li>
                        <li><strong>{gaps.length}</strong> compliance gaps identified requiring remediation</li>
                        <li><strong>{gaps.filter(g=>g.priority==='high').length}</strong> high-priority items requiring immediate attention</li>
                        <li>Strongest framework: <strong>{fws.reduce((best,fw)=>scores[fw].readiness>scores[best].readiness?fw:best,fws[0])}</strong> ({Math.round(Math.max(...fws.map(fw=>scores[fw].readiness)))}%)</li>
                    </ul>
                </div>
            </div>
            
            {/* Page Break before Remediation Roadmap */}
            <div className="page-break-before">
                <h2 style={{fontSize:'16pt',fontWeight:'700',color:'#1e293b',margin:'0 0 20px 0',borderBottom:'2px solid #3b82f6',paddingBottom:'8px'}}>Detailed Remediation Roadmap</h2>
                
                {gaps.length===0?(
                    <div style={{textAlign:'center',padding:'40px',background:'#f0fdf4',borderRadius:'8px',border:'1px solid #86efac'}}>
                        <p style={{fontSize:'14pt',color:'#16a34a',fontWeight:'600',margin:0}}>✓ No compliance gaps identified</p>
                        <p style={{fontSize:'10pt',color:'#64748b',margin:'8px 0 0 0'}}>All assessed controls are compliant</p>
                    </div>
                ):(
                    <table className="remediation-table">
                        <thead>
                            <tr>
                                <th style={{width:'12%'}}>Framework</th>
                                <th style={{width:'15%'}}>Category</th>
                                <th style={{width:'40%'}}>Control Gap</th>
                                <th style={{width:'10%'}}>Priority</th>
                                <th style={{width:'10%'}}>Owner</th>
                                <th style={{width:'13%'}}>Reference</th>
                            </tr>
                        </thead>
                        <tbody>
                            {gaps.slice(0,50).map((gap,i)=>(
                                <tr key={i} className="avoid-break">
                                    <td style={{fontWeight:'500'}}>{gap.framework}</td>
                                    <td>{gap.category}</td>
                                    <td style={{fontSize:'9pt'}}>{gap.question}</td>
                                    <td><span className={gap.priority==='high'?'priority-high':'priority-medium'}>{gap.priority}</span></td>
                                    <td>{gap.owner}</td>
                                    <td><span className="control-ref">{gap.ref||'—'}</span></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                )}
                
                {gaps.length>50&&(
                    <p style={{fontSize:'9pt',color:'#64748b',marginTop:'16px',fontStyle:'italic'}}>
                        Showing first 50 of {gaps.length} gaps. Full remediation list available in digital report.
                    </p>
                )}
            </div>
            
            {/* Framework Details - Each on new page */}
            {fws.map(fw=>{
                const fr=FRAMEWORKS[fw];
                const s=scores[fw];
                const fwGaps=gaps.filter(g=>g.framework===fr.name);
                
                return(
                    <div key={fw} className="page-break-before">
                        <div className="framework-header">
                            <h2 style={{margin:0,fontSize:'14pt'}}>{fr.fullName}</h2>
                            <p style={{margin:'4px 0 0 0',fontSize:'10pt',opacity:0.8}}>{fr.desc}</p>
                        </div>
                        
                        <div style={{padding:'20px',border:'1px solid #e2e8f0',borderTop:'none',borderRadius:'0 0 8px 8px',background:'#fff'}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'20px'}}>
                                <div>
                                    <p style={{margin:0,fontSize:'10pt',color:'#64748b'}}>Readiness Score</p>
                                    <p style={{margin:'4px 0 0 0',fontSize:'24pt',fontWeight:'700',color:s.readiness>=80?'#22c55e':s.readiness>=50?'#f59e0b':'#ef4444'}}>{Math.round(s.readiness)}%</p>
                                </div>
                                <div style={{textAlign:'right'}}>
                                    <p style={{margin:0,fontSize:'10pt',color:'#64748b'}}>Controls Status</p>
                                    <p style={{margin:'4px 0 0 0',fontSize:'11pt'}}><span style={{color:'#22c55e',fontWeight:'600'}}>{s.yes} Compliant</span> / <span style={{color:'#ef4444',fontWeight:'600'}}>{s.answered-s.yes} Gaps</span> / <span style={{color:'#64748b'}}>{s.total-s.answered} Not Assessed</span></p>
                                </div>
                            </div>
                            
                            {fwGaps.length>0&&(
                                <div>
                                    <h4 style={{margin:'0 0 12px 0',fontSize:'11pt',fontWeight:'600',color:'#1e293b'}}>Remediation Items ({fwGaps.length})</h4>
                                    <ul style={{margin:0,paddingLeft:'20px',fontSize:'9pt',lineHeight:'1.8'}}>
                                        {fwGaps.slice(0,10).map((g,i)=>(
                                            <li key={i} className="avoid-break">
                                                <strong>[{g.ref||g.category}]</strong> {g.question} 
                                                <span className={g.priority==='high'?'priority-high':'priority-medium'} style={{marginLeft:'8px'}}>{g.priority}</span>
                                            </li>
                                        ))}
                                        {fwGaps.length>10&&<li style={{color:'#64748b',fontStyle:'italic'}}>...and {fwGaps.length-10} more items</li>}
                                    </ul>
                                </div>
                            )}
                        </div>
                    </div>
                );
            })}
            
            {/* Print Footer */}
            <div className="print-footer">
                <p style={{margin:0}}>{CONFIG.companyName} | {CONFIG.phone} | {CONFIG.contactUrl} | Confidential - Page <span className="pageNumber"></span></p>
            </div>
        </div>
    );
};

    <button

const EmailGate=({onSubmit,trigger})=>{const[form,setForm]=useState({name:'',email:'',company:'',phone:''});const[loading,setLoading]=useState(false);const[errors,setErrors]=useState({});const validate=()=>{const e={};if(!form.name.trim())e.name='Required';if(!form.email.trim())e.email='Required';else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))e.email='Invalid';if(!form.company.trim())e.company='Required';return e;};const submit=async(e)=>{e.preventDefault();const errs=validate();if(Object.keys(errs).length){setErrors(errs);return;}setLoading(true);await new Promise(r=>setTimeout(r,800));const leads=JSON.parse(localStorage.getItem('lsc_leads')||'[]');leads.push({...form,trigger,timestamp:new Date().toISOString()});localStorage.setItem('lsc_leads',JSON.stringify(leads));setLoading(false);onSubmit(form);};return(<div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in"><div className="glass rounded-2xl p-8 max-w-md w-full slide-up"><div className="text-center mb-6"><div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center mx-auto mb-4"><Icon name={trigger==='pdf'?'FileText':'Unlock'} className="w-8 h-8 text-white"/></div><h2 className="text-2xl font-bold text-white mb-2">{trigger==='pdf'?'Download Your Report':'Unlock Full Results'}</h2><p className="text-slate-400">Enter your details to continue</p></div><form onSubmit={submit} className="space-y-4"><input type="text" placeholder="Full Name *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} className={`w-full px-4 py-3 bg-slate-900 border rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 ${errors.name?'border-red-500':'border-slate-700'}`}/><input type="email" placeholder="Work Email *" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} className={`w-full px-4 py-3 bg-slate-900 border rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 ${errors.email?'border-red-500':'border-slate-700'}`}/><input type="text" placeholder="Company *" value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))} className={`w-full px-4 py-3 bg-slate-900 border rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 ${errors.company?'border-red-500':'border-slate-700'}`}/><input type="tel" placeholder="Phone (optional)" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"/><button type="submit" disabled={loading} className="w-full btn-primary py-3 rounded-lg text-white font-semibold flex items-center justify-center gap-2">{loading?<><Icon name="Loader2" className="w-5 h-5 animate-spin"/>Processing...</>:<><Icon name="ArrowRight" className="w-5 h-5"/>Continue</>}</button></form><p className="text-xs text-slate-500 text-center mt-4">We'll send you compliance tips. Unsubscribe anytime.</p></div></div>);};

const PricingModal=({onClose,onSelect,current})=>{const tiers=Object.values(CONFIG.pricing);return(<div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in overflow-y-auto"><div className="glass rounded-2xl p-8 max-w-5xl w-full my-8 slide-up relative"><button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white"><Icon name="X" className="w-6 h-6"/></button><div className="text-center mb-8"><h2 className="text-3xl font-bold text-white mb-2">Choose Your Plan</h2><p className="text-slate-400">Unlock the full power of compliance automation</p></div><div className="grid md:grid-cols-4 gap-4">{tiers.map((t)=>(<div key={t.id} className={`rounded-xl p-6 transition-all relative ${t.id==='pro'?'bg-gradient-to-b from-blue-600/20 to-purple-600/20 border-2 border-blue-500 scale-105':'bg-slate-900/50 border border-slate-700'}`}>{t.id==='pro'&&<div className="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-1 bg-blue-500 text-white text-xs font-bold rounded-full">POPULAR</div>}<h3 className="text-xl font-bold text-white mb-2">{t.name}</h3><div className="mb-4"><span className="text-4xl font-bold text-white">${t.price}</span>{t.price>0&&<span className="text-slate-400">/mo</span>}</div><ul className="space-y-2 mb-6">{t.features.map((f,j)=><li key={j} className="flex items-start gap-2 text-sm text-slate-300"><Icon name="Check" className="w-4 h-4 text-green-400 mt-0.5"/>{f}</li>)}</ul><button onClick={()=>onSelect(t)} className={`w-full py-2.5 rounded-lg font-semibold ${current===t.id?'bg-green-600 text-white':t.id==='pro'?'btn-primary text-white':'bg-slate-700 text-white hover:bg-slate-600'}`}>{current===t.id?'Current':t.price===0?'Start Free':'Upgrade'}</button></div>))}</div><p className="text-center text-slate-400 text-sm mt-6">Need custom solution? <a href={CONFIG.contactUrl} className="text-blue-400 hover:underline">Contact us</a></p></div></div>);};

const CheckoutModal=({tier,onSuccess,onCancel})=>{const[loading,setLoading]=useState(false);const submit=async(e)=>{e.preventDefault();setLoading(true);await new Promise(r=>setTimeout(r,1500));localStorage.setItem('lsc_sub',JSON.stringify({tier:tier.id,date:new Date().toISOString()}));setLoading(false);onSuccess(tier);};return(<div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in"><div className="glass rounded-2xl p-8 max-w-md w-full slide-up"><div className="flex justify-between items-center mb-6"><h2 className="text-xl font-bold text-white">Complete Purchase</h2><button onClick={onCancel} className="text-slate-400 hover:text-white"><Icon name="X" className="w-6 h-6"/></button></div><div className="bg-slate-900 rounded-lg p-4 mb-6 flex justify-between items-center"><div><p className="font-semibold text-white">{tier.name} Plan</p><p className="text-sm text-slate-400">Monthly</p></div><p className="text-2xl font-bold text-white">${tier.price}/mo</p></div><form onSubmit={submit} className="space-y-4"><input placeholder="Card Number" className="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white"/><div className="grid grid-cols-2 gap-4"><input placeholder="MM/YY" className="px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white"/><input placeholder="CVC" className="px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white"/></div><button type="submit" disabled={loading} className="w-full btn-primary py-3 rounded-lg text-white font-semibold flex items-center justify-center gap-2">{loading?<><Icon name="Loader2" className="w-5 h-5 animate-spin"/>Processing...</>:<><Icon name="CreditCard" className="w-5 h-5"/>Pay ${tier.price}/mo</>}</button></form><p className="text-center text-slate-500 text-sm mt-4 flex items-center justify-center gap-2"><Icon name="Lock" className="w-4 h-4"/>Secured by Stripe</p></div></div>);};

const AdminPanel=({onClose})=>{const leads=JSON.parse(localStorage.getItem('lsc_leads')||'[]');const exportCSV=()=>{const csv=['Name,Email,Company,Phone,Source,Date',...leads.map(l=>`${l.name},${l.email},${l.company},${l.phone||''},${l.trigger},${l.timestamp}`)].join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='leads.csv';a.click();};return(<div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in"><div className="glass rounded-2xl p-8 max-w-4xl w-full max-h-[80vh] overflow-auto slide-up"><div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold text-white">Lead Dashboard</h2><div className="flex gap-3"><button onClick={exportCSV} className="px-4 py-2 bg-green-600 text-white rounded-lg font-medium flex items-center gap-2"><Icon name="Download" className="w-4 h-4"/>Export</button><button onClick={onClose} className="text-slate-400 hover:text-white"><Icon name="X" className="w-6 h-6"/></button></div></div><div className="grid grid-cols-3 gap-4 mb-6"><div className="bg-slate-900 rounded-xl p-4"><p className="text-slate-400 text-sm">Total Leads</p><p className="text-3xl font-bold text-white">{leads.length}</p></div><div className="bg-slate-900 rounded-xl p-4"><p className="text-slate-400 text-sm">This Week</p><p className="text-3xl font-bold text-white">{leads.filter(l=>new Date(l.timestamp)>Date.now()-7*24*60*60*1000).length}</p></div><div className="bg-slate-900 rounded-xl p-4"><p className="text-slate-400 text-sm">PDF Downloads</p><p className="text-3xl font-bold text-white">{leads.filter(l=>l.trigger==='pdf').length}</p></div></div>{leads.length===0?<p className="text-center text-slate-400 py-8">No leads yet</p>:(<table className="w-full"><thead><tr className="border-b border-slate-700"><th className="text-left py-2 px-3 text-slate-400">Name</th><th className="text-left py-2 px-3 text-slate-400">Email</th><th className="text-left py-2 px-3 text-slate-400">Company</th><th className="text-left py-2 px-3 text-slate-400">Source</th></tr></thead><tbody>{leads.slice().reverse().map((l,i)=><tr key={i} className="border-b border-slate-800"><td className="py-2 px-3 text-white">{l.name}</td><td className="py-2 px-3 text-slate-300">{l.email}</td><td className="py-2 px-3 text-slate-300">{l.company}</td><td className="py-2 px-3"><span className="px-2 py-1 rounded text-xs bg-blue-500/20 text-blue-300">{l.trigger}</span></td></tr>)}</tbody></table>)}</div></div>);};

const RadarChart=({data,frameworks})=>{const cx=150,cy=150,maxR=100;const pt=(a,r)=>({x:cx+r*Math.cos((a-90)*Math.PI/180),y:cy+r*Math.sin((a-90)*Math.PI/180)});const step=360/frameworks.length;const grid=[1,2,3,4,5].map(l=><polygon key={l} points={frameworks.map((_,i)=>pt(i*step,maxR/5*l)).map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="#334155" strokeWidth="1"/>);const axes=frameworks.map((_,i)=>{const p=pt(i*step,maxR);return<line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#334155"/>});const pts=frameworks.map((f,i)=>pt(i*step,(data[f]||0)/100*maxR));const labels=frameworks.map((f,i)=>{const p=pt(i*step,maxR+20);return<g key={f}><text x={p.x} y={p.y} textAnchor="middle" fill={FRAMEWORKS[f].color} fontSize="10" fontWeight="600">{FRAMEWORKS[f].name}</text><text x={p.x} y={p.y+12} textAnchor="middle" fill="#94a3b8" fontSize="9">{Math.round(data[f]||0)}%</text></g>});return(<svg viewBox="0 0 300 300" className="w-full h-full"><defs><linearGradient id="rf" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#3b82f6" stopOpacity=".3"/><stop offset="100%" stopColor="#8b5cf6" stopOpacity=".3"/></linearGradient></defs>{grid}{axes}<polygon points={pts.map(p=>`${p.x},${p.y}`).join(' ')} fill="url(#rf)" stroke="#3b82f6" strokeWidth="2"/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="5" fill={FRAMEWORKS[frameworks[i]].color} stroke="#fff" strokeWidth="2"/>)}{labels}</svg>);};

const ProgressRing=({progress,color,size=70})=>{const sw=7,r=(size-sw)/2,c=r*2*Math.PI,o=c-(progress/100)*c;return(<svg width={size} height={size} className="transform -rotate-90"><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" className="transition-all duration-500"/></svg>);};

const QuestionCard=({q,answer,onAnswer,locked,synced})=>(<div className={`bg-slate-900/50 border rounded-xl p-5 transition-all ${locked?'opacity-50':answer===true?'border-green-500/50 bg-green-900/10':answer===false?'border-red-500/50 bg-red-900/10':'border-slate-700 hover:border-slate-600'}`}><div className="flex items-start gap-4"><div className="flex-1"><p className="text-slate-200">{q.text}</p><div className="flex flex-wrap gap-2 mt-3"><span className={`px-2 py-1 rounded-full text-xs ${q.priority==='high'?'bg-red-500/20 text-red-300':'bg-amber-500/20 text-amber-300'}`}>{q.priority}</span><span className="px-2 py-1 rounded-full text-xs bg-slate-700 text-slate-300">{q.owner}</span>{q.ref&&<span className="px-2 py-1 rounded-full text-xs bg-purple-500/20 text-purple-300">{q.ref}</span>}{q.map&&<span className="px-2 py-1 rounded-full text-xs bg-blue-500/20 text-blue-300">Cross-mapped</span>}{synced&&<span className="px-2 py-1 rounded-full text-xs bg-cyan-500/20 text-cyan-300">From {synced}</span>}</div></div><div className="flex gap-2"><button onClick={()=>!locked&&onAnswer(true)} disabled={locked} className={`p-3 rounded-xl ${answer===true?'bg-green-500 text-white':'bg-slate-800 text-slate-400 hover:bg-green-500/20'}`}><Icon name="Check" className="w-5 h-5"/></button><button onClick={()=>!locked&&onAnswer(false)} disabled={locked} className={`p-3 rounded-xl ${answer===false?'bg-red-500 text-white':'bg-slate-800 text-slate-400 hover:bg-red-500/20'}`}><Icon name="X" className="w-5 h-5"/></button></div></div></div>);

const CategoryAccordion=({cat,answers,onAnswer,getSynced,expanded,toggle,locked})=>{const ans=cat.questions.filter(q=>answers[q.id]!==undefined).length;const yes=cat.questions.filter(q=>answers[q.id]===true).length;const pct=ans>0?Math.round(yes/ans*100):0;return(<div className="glass border border-slate-700/50 rounded-xl overflow-hidden"><button onClick={toggle} className="w-full flex items-center justify-between p-5 hover:bg-slate-800/30"><div className="flex items-center gap-3"><Icon name={expanded?'ChevronDown':'ChevronRight'} className="w-5 h-5 text-slate-400"/><div className="text-left"><h3 className="font-semibold text-white">{cat.name}</h3><p className="text-sm text-slate-500">{cat.desc} • {cat.questions.length} controls</p></div></div><div className="flex items-center gap-4"><span className="text-sm text-slate-400">{ans}/{cat.questions.length}</span><span className={`font-bold ${pct>=80?'text-green-400':pct>=50?'text-amber-400':pct>0?'text-red-400':'text-slate-600'}`}>{ans>0?`${pct}%`:'—'}</span></div></button>{expanded&&<div className="p-5 pt-0 space-y-3">{cat.questions.map(q=><QuestionCard key={q.id} q={q} answer={answers[q.id]} onAnswer={v=>onAnswer(q.id,v,q.map)} locked={locked} synced={getSynced(q.id,q.map)}/>)}</div>}</div>);};

const ActionItems=({answers,fw})=>{const items={IT:[],HR:[],Executive:[]};FRAMEWORKS[fw].categories.forEach(c=>c.questions.forEach(q=>{if(answers[q.id]===false)items[q.owner].push({...q,cat:c.name})}));Object.keys(items).forEach(o=>items[o].sort((a,b)=>(a.priority==='high'?0:1)-(b.priority==='high'?0:1)));const cfg={IT:{icon:'Monitor',color:'from-blue-500 to-cyan-500'},HR:{icon:'Users',color:'from-green-500 to-emerald-500'},Executive:{icon:'Briefcase',color:'from-purple-500 to-pink-500'}};return(<div className="space-y-6">{Object.entries(cfg).map(([owner,c])=>(<div key={owner} className="glass border border-slate-700/50 rounded-xl overflow-hidden"><div className={`flex items-center gap-4 p-5 bg-gradient-to-r ${c.color} bg-opacity-10`}><div className={`p-3 rounded-xl bg-gradient-to-br ${c.color}`}><Icon name={c.icon} className="w-6 h-6 text-white"/></div><div><h3 className="font-bold text-white">{owner==='IT'?'IT Team':owner==='HR'?'HR/Admin':'Executive'}</h3><p className="text-sm text-slate-400">{items[owner].length} items</p></div></div><div className="p-5">{items[owner].length===0?<p className="text-center text-green-400 py-4"><Icon name="CheckCircle" className="w-8 h-8 mx-auto mb-2"/>All good!</p>:<ul className="space-y-2">{items[owner].map((it,i)=><li key={i} className="flex items-start gap-3 p-3 bg-slate-900/50 rounded-lg"><span className={`mt-1 w-2 h-2 rounded-full ${it.priority==='high'?'bg-red-500':'bg-amber-500'}`}/><div><p className="text-slate-200">{it.text}</p><p className="text-xs text-slate-500">{it.cat} • {it.ref||''}</p></div></li>)}</ul>}</div></div>))}</div>);};

function App(){const[fw,setFw]=useState('SOC2');const[answers,setAnswers]=useState({});const[maps,setMaps]=useState({});const[expanded,setExpanded]=useState({});const[tab,setTab]=useState('assessment');const[user,setUser]=useState(null);const[tier,setTier]=useState('free');const[showGate,setShowGate]=useState(false);const[gateTrigger,setGateTrigger]=useState('');const[showPricing,setShowPricing]=useState(false);const[showCheckout,setShowCheckout]=useState(null);const[showAdmin,setShowAdmin]=useState(false);const[companyName,setCompanyName]=useState('');const fws=['SOC2','HIPAA','PCI-DSS','CMMC'];useEffect(()=>{const a=localStorage.getItem('lsc_a'),m=localStorage.getItem('lsc_m'),u=localStorage.getItem('lsc_u'),s=localStorage.getItem('lsc_sub'),c=localStorage.getItem('lsc_company');if(a)setAnswers(JSON.parse(a));if(m)setMaps(JSON.parse(m));if(u)setUser(JSON.parse(u));if(s)setTier(JSON.parse(s).tier);if(c)setCompanyName(c);},[]);useEffect(()=>{localStorage.setItem('lsc_a',JSON.stringify(answers))},[answers]);useEffect(()=>{localStorage.setItem('lsc_m',JSON.stringify(maps))},[maps]);useEffect(()=>{localStorage.setItem('lsc_company',companyName)},[companyName]);const scores=useMemo(()=>{const s={};fws.forEach(f=>{let tot=0,ans=0,yes=0;FRAMEWORKS[f].categories.forEach(c=>c.questions.forEach(q=>{tot++;if(answers[q.id]!==undefined){ans++;if(answers[q.id])yes++}else if(q.map&&maps[q.map]){ans++;if(maps[q.map].v)yes++}}));s[f]={total:tot,answered:ans,yes,readiness:ans>0?yes/ans*100:0,completion:tot>0?ans/tot*100:0};});return s;},[answers,maps]);const totalAns=Object.values(scores).reduce((s,x)=>s+x.answered,0);const shouldGate=totalAns>=5&&!user;const handleAnswer=useCallback((qid,v,mapId)=>{if(shouldGate){setGateTrigger('results');setShowGate(true);return;}setAnswers(p=>({...p,[qid]:v}));if(mapId)setMaps(p=>({...p,[mapId]:{v,src:fw,qid}}));},[fw,shouldGate]);const getSynced=useCallback((qid,mapId)=>{if(!mapId||!maps[mapId]||maps[mapId].qid===qid)return null;return FRAMEWORKS[maps[mapId].src]?.name;},[maps]);const getEffective=useCallback(()=>{const e={...answers};FRAMEWORKS[fw].categories.forEach(c=>c.questions.forEach(q=>{if(q.map&&maps[q.map]&&e[q.id]===undefined)e[q.id]=maps[q.map].v;}));return e;},[answers,maps,fw]);

// Print Report Handler - triggers browser print dialog
const handlePrintReport=()=>{
    if(!user&&totalAns<5){
        setGateTrigger('pdf');
        setShowGate(true);
        return;
    }
    // Small delay to ensure PrintableReport is rendered
    setTimeout(()=>{window.print();},100);
};

const handlePDF=()=>{if(!user){setGateTrigger('pdf');setShowGate(true);return;}generatePDF(scores,answers,user).save(`Compliance-Report-${user.company}.pdf`);};const handleEmailSubmit=(data)=>{setUser(data);localStorage.setItem('lsc_u',JSON.stringify(data));if(data.company)setCompanyName(data.company);setShowGate(false);if(gateTrigger==='pdf')generatePDF(scores,answers,data).save(`Compliance-Report-${data.company}.pdf`);};const handleTierSelect=(t)=>{setShowPricing(false);if(t.price>0)setShowCheckout(t);};const handlePaySuccess=(t)=>{setTier(t.id);setShowCheckout(null);};const eff=getEffective();const cur=FRAMEWORKS[fw];const score=scores[fw];const locked=cur.tier==='pro'&&tier==='free';

return(<div className="min-h-screen">
{/* Printable Report - Hidden on screen, shown only when printing */}
<PrintableReport scores={scores} answers={answers} user={user} companyName={companyName}/>

<header className="sticky top-0 z-40 glass border-b border-slate-700/50 no-print"><div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"><div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center"><Icon name="ShieldCheck" className="w-6 h-6 text-white"/></div><div><h1 className="font-bold text-white">{CONFIG.companyName}</h1><p className="text-xs text-slate-400">{CONFIG.version}</p></div></div><div className="flex items-center gap-3"><button onClick={()=>setShowPricing(true)} className="px-4 py-2 text-slate-300 hover:text-white flex items-center gap-2"><Icon name="Zap" className="w-4 h-4"/>{tier==='free'?'Upgrade':'Plan'}</button><DownloadReportButton onClick={handlePrintReport}/><button onClick={handlePDF} className="btn-primary px-4 py-2 rounded-lg text-white flex items-center gap-2" title="Download jsPDF Report"><Icon name="Download" className="w-4 h-4"/>PDF</button><button onClick={()=>setShowAdmin(true)} className="p-2 text-slate-400 hover:text-white"><Icon name="Settings" className="w-5 h-5"/></button></div></div></header>

<div className="max-w-7xl mx-auto px-4 py-6"><div className="flex gap-3 overflow-x-auto pb-2">{fws.map(f=>{const fr=FRAMEWORKS[f];const sc=scores[f];const isLocked=fr.tier==='pro'&&tier==='free';return(<button key={f} onClick={()=>setFw(f)} className={`flex-shrink-0 flex items-center gap-4 px-5 py-4 rounded-xl border transition-all ${fw===f?'border-blue-500 bg-blue-500/10':'border-slate-700 bg-slate-900/50 hover:border-slate-600'}`}><div className="relative"><ProgressRing progress={sc.readiness} color={fr.color}/><div className="absolute inset-0 flex items-center justify-center"><span className="text-sm font-bold" style={{color:fr.color}}>{Math.round(sc.readiness)}%</span></div></div><div className="text-left"><div className="flex items-center gap-2"><span className="font-semibold text-white">{fr.name}</span>{isLocked&&<Icon name="Lock" className="w-4 h-4 text-amber-400"/>}</div><p className="text-xs text-slate-400">{sc.answered}/{sc.total}</p></div></button>)})}</div></div>

<main className="max-w-7xl mx-auto px-4 pb-12"><div className="grid lg:grid-cols-3 gap-8"><div className="lg:col-span-2 space-y-6"><div className="flex gap-2 border-b border-slate-700 pb-2">{[{id:'assessment',icon:'ClipboardList',label:'Assessment'},{id:'actions',icon:'ListTodo',label:'Action Items'},{id:'mapping',icon:'Network',label:'Mapping'}].map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} className={`px-4 py-2 rounded-t-lg flex items-center gap-2 ${tab===t.id?'bg-slate-800 text-white':'text-slate-400 hover:text-white'}`}><Icon name={t.icon} className="w-4 h-4"/>{t.label}</button>))}</div>

{locked&&(<div className="bg-gradient-to-r from-amber-500/20 to-orange-500/20 border border-amber-500/50 rounded-xl p-6 flex items-center gap-4"><div className="p-3 rounded-xl bg-amber-500/20"><Icon name="Lock" className="w-8 h-8 text-amber-400"/></div><div className="flex-1"><h3 className="font-bold text-white">{cur.name} requires Pro</h3><p className="text-slate-300">Upgrade to unlock</p></div><button onClick={()=>setShowPricing(true)} className="btn-primary px-6 py-3 rounded-lg text-white font-semibold">Upgrade</button></div>)}

{tab==='assessment'&&(<div className="space-y-4"><div className="flex items-center justify-between"><div><h2 className="text-2xl font-bold text-white">{cur.fullName}</h2><p className="text-slate-400">{cur.desc}</p></div><div className="text-right"><p className="text-3xl font-bold" style={{color:cur.color}}>{Math.round(score.readiness)}%</p><p className="text-sm text-slate-400">Readiness</p></div></div>{cur.categories.map((cat,i)=>(<CategoryAccordion key={i} cat={cat} answers={eff} onAnswer={handleAnswer} getSynced={getSynced} expanded={expanded[`${fw}-${i}`]} toggle={()=>setExpanded(p=>({...p,[`${fw}-${i}`]:!p[`${fw}-${i}`]}))} locked={locked}/>))}</div>)}

{tab==='actions'&&<ActionItems answers={eff} fw={fw}/>}

{tab==='mapping'&&(<div className="glass border border-slate-700/50 rounded-xl p-6"><h3 className="text-xl font-bold text-white mb-4">Cross-Framework Control Mapping</h3><p className="text-slate-400 mb-6">Controls sync across frameworks automatically.</p><div className="space-y-3">{Object.entries(CM).map(([key,id])=>{const m=maps[id];return(<div key={key} className="flex items-center justify-between p-4 bg-slate-900/50 rounded-lg"><div className="flex items-center gap-3"><div className={`w-3 h-3 rounded-full ${m?m.v?'bg-green-500':'bg-red-500':'bg-slate-600'}`}/><span className="text-slate-200">{key.replace(/_/g,' ')}</span></div><div className="text-sm text-slate-400">{m?<span>From <span className="text-blue-400">{FRAMEWORKS[m.src]?.name}</span></span>:'Not set'}</div></div>)})}</div></div>)}</div>

<div className="space-y-6"><div className="glass border border-slate-700/50 rounded-xl p-6"><h3 className="font-semibold text-white mb-4">Overall Compliance</h3><div className="h-72"><RadarChart data={Object.fromEntries(fws.map(f=>[f,scores[f].readiness]))} frameworks={fws}/></div></div>

<div className="glass border border-slate-700/50 rounded-xl p-6"><h3 className="font-semibold text-white mb-4">Stats: {cur.name}</h3><div className="space-y-4"><div className="flex justify-between"><span className="text-slate-400">Categories</span><span className="text-white">{cur.categories.length}</span></div><div className="flex justify-between"><span className="text-slate-400">Controls</span><span className="text-white">{score.total}</span></div><div className="flex justify-between"><span className="text-slate-400">Answered</span><span className="text-green-400">{score.answered}</span></div><div className="flex justify-between"><span className="text-slate-400">Compliant</span><span className="text-green-400">{score.yes}</span></div><div className="flex justify-between"><span className="text-slate-400">Gaps</span><span className="text-red-400">{score.answered-score.yes}</span></div><div className="pt-4 border-t border-slate-700"><div className="flex justify-between"><span className="text-slate-400">Readiness</span><span className="text-xl font-bold" style={{color:cur.color}}>{Math.round(score.readiness)}%</span></div><div className="mt-2 h-2 bg-slate-800 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-500" style={{width:`${score.readiness}%`,background:cur.color}}/></div></div></div></div>

<div className="glass border border-slate-700/50 rounded-xl p-6 bg-gradient-to-br from-blue-600/10 to-purple-600/10"><h3 className="font-semibold text-white mb-2">Need Help?</h3><p className="text-slate-400 text-sm mb-4">Expert guidance for compliance success.</p><a href={CONFIG.contactUrl} target="_blank" rel="noopener" className="btn-primary w-full py-3 rounded-lg text-white font-semibold flex items-center justify-center gap-2"><Icon name="Calendar" className="w-4 h-4"/>Schedule Call</a><p className="text-center text-slate-500 text-xs mt-3">{CONFIG.phone}</p></div></div></div></main>

{showGate&&<EmailGate onSubmit={handleEmailSubmit} trigger={gateTrigger}/>}
{showPricing&&<PricingModal onClose={()=>setShowPricing(false)} onSelect={handleTierSelect} current={tier}/>}
{showCheckout&&<CheckoutModal tier={showCheckout} onSuccess={handlePaySuccess} onCancel={()=>setShowCheckout(null)}/>}
{showAdmin&&<AdminPanel onClose={()=>setShowAdmin(false)}/>}
</div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
